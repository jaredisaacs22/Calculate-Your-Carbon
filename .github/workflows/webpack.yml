name: Frontend check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  html-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify key HTML files exist
        run: |
          for f in index.html equipment/index.html equipment/compare.html equipment/hybrid.html equipment/load-profiles.html; do
            [ -f "$f" ] && echo "OK: $f" || (echo "MISSING: $f" && exit 1)
          done
